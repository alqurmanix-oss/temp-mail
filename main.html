<style>
/* ===================================================
   ROOT VARIABLES
=================================================== */
:root {
  --g1:#FFD700; --g2:#FFC200; --g3:#E6A800; --g4:#F0B429;
  --g5:#FFEC80; --g6:#C8860A; --g7:#B8720A; --g8:#FFE066;
  --neon:#39FF14; --cyan:#00FFFF;
  --bg:#020409; --card:rgba(8,11,24,0.96);
  --glass:rgba(255,215,0,0.055); --border:rgba(255,215,0,0.22);
  --borderhov:rgba(255,215,0,0.55); --txt:#F5F0DC;
  --muted:rgba(245,240,220,0.52);
  --shadow:0 0 28px rgba(255,215,0,0.18),0 0 56px rgba(255,215,0,0.08);
  --sw:320px; --th:64px; --r:16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--txt);
  font-family:'Tajawal',sans-serif;
  min-height:100vh;overflow-x:hidden;direction:rtl;
}
body.ltr{direction:ltr;font-family:'Playfair Display','Tajawal',sans-serif}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse at 15% 50%,rgba(255,215,0,0.035) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 15%,rgba(0,255,255,0.025) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 85%,rgba(57,255,20,0.018) 0%,transparent 50%);
}
/* Stars */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(1px 1px at 10% 15%,rgba(255,215,0,0.6) 0%,transparent 100%),
    radial-gradient(1px 1px at 30% 40%,rgba(255,255,255,0.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 55% 10%,rgba(255,215,0,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 75% 60%,rgba(255,255,255,0.3) 0%,transparent 100%),
    radial-gradient(1px 1px at 90% 30%,rgba(255,215,0,0.4) 0%,transparent 100%),
    radial-gradient(1px 1px at 20% 75%,rgba(255,255,255,0.35) 0%,transparent 100%),
    radial-gradient(1px 1px at 65% 85%,rgba(255,215,0,0.5) 0%,transparent 100%),
    radial-gradient(1px 1px at 45% 55%,rgba(255,255,255,0.25) 0%,transparent 100%);
}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--g3)}

/* ===================================================
   TOPBAR
=================================================== */
#topbar{
  position:fixed;top:0;left:0;right:0;height:var(--th);z-index:1000;
  display:flex;align-items:center;justify-content:space-between;padding:0 18px;
  background:rgba(2,4,9,0.97);border-bottom:1px solid var(--border);
  backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
  box-shadow:0 2px 30px rgba(255,215,0,0.07);
}
#menuBtn{
  width:44px;height:44px;border:1px solid var(--border);border-radius:10px;
  background:var(--glass);cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:5px;transition:all .3s;flex-shrink:0;
}
#menuBtn:hover{border-color:var(--g1);box-shadow:var(--shadow)}
#menuBtn span{display:block;width:22px;height:2px;background:var(--g1);border-radius:2px;transition:all .3s}

#logo{
  font-family:'Cinzel Decorative',cursive;font-weight:900;
  font-size:clamp(16px,3.2vw,26px);letter-spacing:2px;
  background:linear-gradient(90deg,var(--g6),var(--g1),var(--g5),var(--g2),var(--g8),var(--g3),var(--g4),var(--g1));
  background-size:400% 100%;-webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text;
  animation:goldShift 4s linear infinite;user-select:none;
}
@keyframes goldShift{0%{background-position:0% 50%}100%{background-position:400% 50%}}

#topRight{display:flex;align-items:center;gap:14px;flex-shrink:0}

/* Online indicator */
#onlineWrap{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--neon);font-weight:600}
#onlineDot{
  width:9px;height:9px;border-radius:50%;background:var(--neon);flex-shrink:0;
  box-shadow:0 0 7px var(--neon),0 0 14px rgba(57,255,20,0.45);
  animation:blink 1.5s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}

/* Globe */
#globeWrap{position:relative;cursor:pointer;flex-shrink:0}

  border:1.5px solid var(--border);
  box-shadow:0 0 14px rgba(255,215,0,0.18),inset 0 0 18px rgba(0,80,255,0.12);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  animation:spinY 14s linear infinite;font-size:22px;
}
@keyframes spinY{from{transform:rotateY(0)}to{transform:rotateY(360deg)}}

#langDrop{
  display:none;position:absolute;top:56px;right:0;
  background:rgba(3,6,18,0.99);border:1px solid var(--border);
  border-radius:12px;min-width:158px;z-index:9999;overflow:hidden;
  box-shadow:0 8px 40px rgba(255,215,0,0.14);animation:fadeDown .22s ease;
}
body.ltr #langDrop{right:auto;left:0}

@keyframes fadeDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.li{

  border-bottom:1px solid rgba(255,215,0,0.06);
}
.li:last-child{border-bottom:none}

/* ===================================================
   SIDEBAR OVERLAY
=================================================== */
#overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.68);z-index:1500;
  opacity:0;pointer-events:none;transition:opacity .4s;backdrop-filter:blur(5px);
}
#overlay.on{opacity:1;pointer-events:all}

/* ===================================================
   SIDEBAR
=================================================== */
#sidebar{
  position:fixed;top:0;right:-340px;width:var(--sw);height:100vh;z-index:1600;
  background:linear-gradient(180deg,rgba(4,7,20,0.995) 0%,rgba(8,12,28,0.995) 100%);
  border-left:1px solid var(--border);
  box-shadow:-6px 0 50px rgba(255,215,0,0.1);
  transition:right .44s cubic-bezier(.22,1,.36,1);
  display:flex;flex-direction:column;overflow-y:auto;overflow-x:hidden;
}

#sidebar.open{right:0}
body.ltr #sidebar.open{right:auto;left:0}

/* 4 stripes */
.stripes{
  height:5px;flex-shrink:0;
  background:linear-gradient(90deg,var(--g6) 0%,var(--g1) 25%,var(--g5) 50%,var(--g8) 75%,var(--g3) 100%);
}
#sbClose{
  position:absolute;top:14px;right:14px;width:34px;height:34px;
  border:1px solid var(--border);border-radius:8px;background:var(--glass);
  color:var(--g1);font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:5;
}
body.ltr #sbClose{right:auto;left:14px}
#sbClose:hover{background:rgba(255,215,0,0.14);box-shadow:var(--shadow)}

/* Datetime in sidebar */

  padding:50px 18px 14px;text-align:center;
  border-bottom:1px solid var(--border);flex-shrink:0;
}
#sbTime{
  font-family:'Cinzel Decorative',cursive;font-size:24px;font-weight:700;
  background:linear-gradient(135deg,var(--g1),var(--g5));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#sbDate{font-size:12px;color:var(--muted);margin-top:4px;line-height:1.5}

/* Sidebar user */
#sbUser{
  display:flex;align-items:center;gap:11px;padding:14px 16px;
  border-bottom:1px solid var(--border);background:var(--glass);flex-shrink:0;
}
#sbAvatar{
  width:48px;height:48px;border-radius:50%;border:2px solid var(--g1);
  object-fit:cover;box-shadow:0 0 10px rgba(255,215,0,0.3);flex-shrink:0;
}
#sbName{font-size:14px;font-weight:700;color:var(--g1);text-shadow:0 0 10px rgba(255,215,0,0.3)}
#sbSub{font-size:10px;color:var(--muted);margin-top:2px}

/* Nav */
.nav{padding:6px 0;flex:1}
.ni{
  display:flex;align-items:center;gap:11px;padding:11px 18px;
  cursor:pointer;transition:all .22s;font-size:13.5px;color:var(--muted);
  border-right:3px solid transparent;text-decoration:none;position:relative;overflow:hidden;
}
body.ltr .ni{border-right:none;border-left:3px solid transparent}
.ni::before{
  content:'';position:absolute;inset:0;

  opacity:0;transition:opacity .22s;
}
.ni:hover::before{opacity:1}
.ni:hover{color:var(--g1);border-right-color:var(--g1)}
body.ltr .ni:hover{border-right-color:transparent;border-left-color:var(--g1)}
.nem{font-size:19px;flex-shrink:0}

.nl{font-weight:600}

.logout:hover{border-right-color:#FF4455 !important;color:#FF6677 !important}

/* ===================================================
   MAIN CONTENT
=================================================== */
#page{
  margin-top:var(--th);padding:28px 18px 90px;
  max-width:1400px;margin-left:auto;margin-right:auto;
  position:relative;z-index:1;
}

/* ===================================================
   HERO — user card + points
=================================================== */
#hero{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:36px}
@media(max-width:700px){#hero{grid-template-columns:1fr}}

.hcard{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:26px 22px;box-shadow:var(--shadow);position:relative;overflow:hidden;
  transition:transform .3s,box-shadow .3s;
  animation:fadeUp .6s ease both;
}
.hcard::before{
  content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--g6),var(--g1),var(--g5),var(--g2));
}
.hcard:hover{transform:translateY(-4px);box-shadow:0 14px 50px rgba(255,215,0,0.2),0 0 80px rgba(255,215,0,0.07)}

/* user card */
#ucard{display:flex;align-items:center;gap:18px}
#mainAv{
  width:76px;height:76px;border-radius:50%;border:3px solid var(--g1);
  object-fit:cover;box-shadow:0 0 18px rgba(255,215,0,0.38),0 0 36px rgba(255,215,0,0.12);flex-shrink:0;
}
#mainName{
  font-family:'Cinzel Decorative',cursive;font-size:clamp(14px,2.2vw,20px);font-weight:700;
  background:linear-gradient(135deg,var(--g1),var(--g5));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#mainSub{font-size:11px;color:var(--muted);margin-top:4px}

/* points card */
#pcard{text-align:center;animation-delay:.1s}
.ptitle{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
#ptsVal{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(26px,5vw,46px);font-weight:900;
  background:linear-gradient(135deg,var(--g6),var(--g1),var(--g5));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gp 2.5s ease-in-out infinite;
}
@keyframes gp{0%,100%{filter:brightness(1)}50%{filter:brightness(1.35)}}
.pacts{display:flex;gap:10px;justify-content:center;margin-top:13px}
.pbtn{
  padding:8px 16px;border:1px solid var(--border);border-radius:8px;
  background:var(--glass);color:var(--g1);font-size:12px;font-weight:700;
  cursor:pointer;transition:all .25s;text-decoration:none;font-family:'Tajawal',sans-serif;
  display:inline-block;
}
.pbtn:hover{background:rgba(255,215,0,0.14);box-shadow:var(--shadow);transform:scale(1.04)}

/* ===================================================
   SECTION TITLE
=================================================== */
.stitle{
  font-family:'Cinzel Decorative',cursive;
  font-size:clamp(16px,2.8vw,24px);font-weight:700;text-align:center;margin-bottom:22px;
  background:linear-gradient(135deg,var(--g6),var(--g1),var(--g5));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  position:relative;
}
.stitle::after{
  content:'';display:block;width:70px;height:2px;
  background:linear-gradient(90deg,transparent,var(--g1),transparent);
  margin:8px auto 0;
}

/* ===================================================
   GATES GRID
=================================================== */
#gates{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-bottom:36px}

.gc{
  background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:26px 18px;text-align:center;cursor:pointer;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  position:relative;overflow:hidden;text-decoration:none;color:var(--txt);
  display:flex;flex-direction:column;align-items:center;gap:11px;
  opacity:0;animation:fadeUp .5s ease forwards;
}
.gc::before{
  content:'';position:absolute;inset:0;
  background:radial-gradient(ellipse at center,rgba(255,215,0,0.07) 0%,transparent 70%);
  opacity:0;transition:opacity .35s;
}
.gc:hover::before{opacity:1}
.gc:hover{
  transform:translateY(-7px) scale(1.025);border-color:var(--g1);
  box-shadow:0 16px 48px rgba(255,215,0,0.18),0 0 28px rgba(255,215,0,0.09);
}
.gc:nth-child(1){animation-delay:.08s}
.gc:nth-child(2){animation-delay:.16s}
.gc:nth-child(3){animation-delay:.24s}
.gc:nth-child(4){animation-delay:.32s}
.gem{font-size:40px;filter:drop-shadow(0 0 7px rgba(255,215,0,0.35))}
.gname{
  font-family:'Cinzel Decorative',cursive;font-size:13px;font-weight:700;color:var(--g1);
}
.gdesc{font-size:11.5px;color:var(--muted);line-height:1.65}

/* ===================================================
   EXTRA SECTION — store/services/platforms
=================================================== */
#extra{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:44px}
.ec{
  background:linear-gradient(135deg,rgba(8,11,24,0.97),rgba(14,20,38,0.97));
  border:1px solid var(--border);border-radius:var(--r);padding:20px 16px;
  text-align:center;cursor:pointer;transition:all .3s;text-decoration:none;
  color:var(--txt);position:relative;overflow:hidden;
}
.ec::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--g6),var(--g1),var(--g5));
  transform:scaleX(0);transition:transform .3s;
}
.ec:hover::after{transform:scaleX(1)}
.ec:hover{transform:translateY(-5px);border-color:var(--borderhov);box-shadow:var(--shadow)}
.eem{font-size:30px;margin-bottom:7px}
.ename{font-size:13px;font-weight:700;color:var(--g1);margin-bottom:3px}
.edesc{font-size:11px;color:var(--muted)}

/* ===================================================
   FOOTER BANNER
=================================================== */
#fban{
  background:linear-gradient(135deg,rgba(255,215,0,0.055) 0%,rgba(255,215,0,0.02) 100%);
  border:1px solid var(--border);border-radius:var(--r);padding:30px 24px;
  text-align:center;cursor:pointer;transition:all .3s;text-decoration:none;
  display:block;position:relative;overflow:hidden;
}
#fban::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(255,215,0,0.04),rgba(0,255,255,0.015));
  opacity:0;transition:opacity .3s;
}
#fban:hover::before{opacity:1}
#fban:hover{transform:scale(1.008);box-shadow:var(--shadow)}
.fbt{
  font-family:'Cinzel Decorative',cursive;font-size:clamp(13px,2.3vw,20px);
  font-weight:700;color:var(--g1);margin-bottom:7px;
}
.fbs{font-size:12.5px;color:var(--muted)}
.fba{display:inline-block;margin-top:11px;font-size:18px;animation:bnc 1.6s ease-in-out infinite}
@keyframes bnc{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}

/* ===================================================
   PRAYER ICON (floating)
=================================================== */
#prayBtn{
  position:fixed;bottom:30px;right:26px;width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,rgba(255,215,0,0.13),rgba(255,215,0,0.06));
  border:1.5px solid var(--border);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:23px;
  z-index:900;transition:all .3s;box-shadow:0 0 18px rgba(255,215,0,0.22),0 0 36px rgba(255,215,0,0.08);
  animation:pGlow 3s ease-in-out infinite;
}

// ─────────────────────────────────────────────────────────
// SESSION GUARD - استقرار 24 ساعة (تعديل القرماني)
// ─────────────────────────────────────────────────────────
function sessionValid() {
  const loginTime = localStorage.getItem("qx_login_time");
  if (!loginTime) return false;
  const dayInMs = 24 * 60 * 60 * 1000; 
  return (Date.now() - Number(loginTime)) < dayInMs;
}

onAuthStateChanged(auth, async (user) => {
  if (user) {
    // تسجيل وقت أول دخول شرعي في المتصفح
    if (!localStorage.getItem("qx_login_time")) {
      localStorage.setItem("qx_login_time", Date.now().toString());
    }

    // فحص صلاحية الـ 24 ساعة
    if (!sessionValid()) {
      await signOut(auth);
      localStorage.clear();
      window.location.replace("index.html");
      return;
    }

     ["mainName", "sbName"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = "جارٍ التحميل...";
});
    // الدخول مستقر -> تحميل البيانات
    await loadUser(user);
    touchActivity(user.uid);
  } else {
    // لو مفيش مستخدم مسجل ارجع للرئيسية
    window.location.replace("index.html");
  }
});

// ─────────────────────────────────────────────────────────
// AUTH STATE — المحرك الأساسي
// ─────────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  // لو مفيش يوزر أو الإيميل مش متأكد — ارجع للرئيسية
  if (!user || !user.emailVerified) {
    window.location.replace("index.html");
    return;
  }

  // لو الجلسة انتهت
  if (!sessionValid()) {
    await signOut(auth);
    sessionStorage.clear();
    window.location.replace("index.html");
    return;
  }

  // كل تمام — حمّل البيانات
  await loadUser(user);
  touchActivity(user.uid);
});

// ─────────────────────────────────────────────────────────
// LOAD USER DATA
// ─────────────────────────────────────────────────────────
/** @param {import("firebase/auth").User} user */
async function loadUser(user) {
  // أولاً: حاول تجيب من Firestore
  try {
    const snap = await getDoc(doc(db, "users", user.uid));
    if (snap.exists()) {
      const d = snap.data();
      setUI(
        d.displayName || d.name || user.displayName || "المستخدم",
        d.photoURL    || user.photoURL || "assets/user-avatar.png",
        d.points      || d.xp || 0
      );
      return;
    }
  } catch (_) {}

  // ثانياً: fallback على user-data.js
  if (typeof USER_DATA !== "undefined") {
    setUI(USER_DATA.name, USER_DATA.photoURL, USER_DATA.points);
    return;
  }

  // ثالثاً: fallback على Firebase auth فقط
  setUI(
    user.displayName || "المستخدم",
    user.photoURL    || "assets/user-avatar.png",
    0
  );
}

/**
 * @param {string} name
 * @param {string} photo
 * @param {number} pts
 */
function setUI(name, photo, pts) {
  // الاسم
  ["mainName","sbName"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = name;
  });
  // الصورة
  ["mainAv","sbAvatar"].forEach(id => {
    const el = /** @type {HTMLImageElement|null} */ (document.getElementById(id));
    if (el) { el.src = photo; el.onerror = () => { el.src = "assets/user-avatar.png"; }; }
  });
  // النقاط — عداد متحرك
  const el = document.getElementById("ptsVal");
  if (el) countUp(el, 0, pts, 1400);
}

/** @param {string} uid */
async function touchActivity(uid) {
  try { await updateDoc(doc(db, "users", uid), { lastActivity: serverTimestamp() }); }
  catch (_) {}
}

/** @param {HTMLElement} el @param {number} from @param {number} to @param {number} ms */
function countUp(el, from, to, ms) {
  const t0 = performance.now();
  const tick = (/** @type {number} */ now) => {
    const p = Math.min((now - t0) / ms, 1);
    const e = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.floor(from + (to - from) * e).toLocaleString();
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

// ─────────────────────────────────────────────────────────
// LANGUAGE ENGINE
// ─────────────────────────────────────────────────────────
/** @type {Lang} */
let lang = /** @type {Lang} */ (sessionStorage.getItem("qx_lang") || "ar");

/** @param {Lang} l */
function applyLang(l) {
  const d = T[l] || T.ar;
  lang = l;
  sessionStorage.setItem("qx_lang", l);
  const rtl = l === "ar";
  document.documentElement.lang = l;
  document.body.dir = rtl ? "rtl" : "ltr";
  document.documentElement.dir = rtl ? "rtl" : "ltr";
  if (rtl) document.body.classList.remove("ltr");
  else     document.body.classList.add("ltr");

  document.querySelectorAll("[data-k]").forEach((/** @type {HTMLElement} */ el) => {
    const k = el.getAttribute("data-k");
    if (k && d[k] !== undefined) el.innerHTML = d[k];
  });

  // prayer text
  const pt = document.getElementById("ptxt");
  if (pt) { pt.innerHTML = d.prayer || ""; pt.dir = rtl ? "rtl" : "ltr"; }

  // globe flag
  const flags = {ar:"🇸🇦",en:"🇬🇧",de:"🇩🇪",it:"🇮🇹",es:"🇪🇸",fr:"🇫🇷",ko:"🇰🇷",hi:"🇮🇳",zh:"🇨🇳",ru:"🇷🇺",ja:"🇯🇵"};
  const g = document.getElementById("globeEl");
  if (g) g.textContent = flags[l] || "🌍";
}

// Init language on load
applyLang(Object.keys(T).includes(lang) ? lang : "ar");

// Lang picker
document.getElementById("globeWrap").addEventListener("click", e => {
  e.stopPropagation();
  document.getElementById("langDrop").classList.toggle("show");
});
document.addEventListener("click", () => document.getElementById("langDrop").classList.remove("show"));
document.querySelectorAll(".li").forEach(el => {
  el.addEventListener("click", e => {
    e.stopPropagation();
    applyLang(/** @type {Lang} */ (el.getAttribute("data-l")));
    document.getElementById("langDrop").classList.remove("show");
  });
});

// ─────────────────────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────────────────────
const sb = document.getElementById("sidebar");
const ov = document.getElementById("overlay");

function openSB()  { sb.classList.add("open");  ov.classList.add("on");  document.body.style.overflow = "hidden"; }
function closeSB() { sb.classList.remove("open"); ov.classList.remove("on"); document.body.style.overflow = ""; }

document.getElementById("menuBtn").addEventListener("click", openSB);
document.getElementById("sbClose").addEventListener("click", closeSB);
ov.addEventListener("click", closeSB);

// ─────────────────────────────────────────────────────────
// CLOCK
// ─────────────────────────────────────────────────────────
const localeMap = {ar:"ar-SA",en:"en-GB",de:"de-DE",it:"it-IT",es:"es-ES",fr:"fr-FR",ko:"ko-KR",hi:"hi-IN",zh:"zh-CN",ru:"ru-RU",ja:"ja-JP"};

function tick() {
  const now = new Date();
  const loc  = localeMap[lang] || navigator.language;
  const tEl  = document.getElementById("sbTime");
  const dEl  = document.getElementById("sbDate");
  if (tEl) tEl.textContent = now.toLocaleTimeString(loc, {hour:"2-digit",minute:"2-digit",second:"2-digit"});
  if (dEl) dEl.textContent = now.toLocaleDateString(loc,  {weekday:"long",year:"numeric",month:"long",day:"numeric"});
}
tick(); setInterval(tick, 1000);
