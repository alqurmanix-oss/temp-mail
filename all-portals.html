<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlQurmani X | بوابات العبور</title>
    
    <script>
        // بروتوكول الأمان: فحص التصريح فوراً
        (function() {
            // بنفحص المفتاح اللي "main" بتبعه آلياً عند الضغط
            const accessKey = localStorage.getItem("portal_access_key");
            
            if (accessKey === "AlQurmani_VIP_2026") {
                // المفتاح سليم: اسمح بالدخول وامسح المفتاح لعدم التكرار
                localStorage.removeItem("portal_access_key");

                // العودة التلقائية لمركز القيادة (main.html) بعد 15 ثانية
                setTimeout(() => {
                    window.location.href = "main.html"; 
                }, 15000);
            } else {
                // دخول غير قانوني (رابط مباشر): طرد فوري لـ main.html
                window.location.replace("main.html");
            }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #C8860A, #FFD700, #FFE066, #B8720A);
            --bg: #020409;
        }

        body {
            background-color: var(--bg);
            color: #F5F0DC;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }

        /* لمسة فخامة: توهج ذهبي خافت في الخلفية */
        body::before {
            content: '';
            position: absolute;
            width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(200, 134, 10, 0.05) 0%, transparent 70%);
        }

        .imperial-card {
            position: relative;
            z-index: 10;
            padding: 50px;
            background: rgba(8, 11, 24, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 215, 0, 0.1);
            border-radius: 20px;
            box-shadow: 0 0 50px #000;
            max-width: 600px;
        }

        h1 {
            font-family: 'Cinzel Decorative', cursive;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .msg { font-size: 1.2rem; line-height: 1.8; margin-bottom: 30px; }
        .highlight { color: #FFD700; font-weight: bold; }

        .progress-container {
            width: 100%; height: 2px;
            background: rgba(255, 215, 0, 0.1);
            position: relative; overflow: hidden;
        }

        .progress-fill {
            height: 100%; width: 0;
            background: var(--gold);
            animation: moveBar 15s linear forwards;
        }

        @keyframes moveBar { to { width: 100%; } }

        .btn-back {
            display: inline-block;
            margin-top: 30px;
            color: #FFD700;
            text-decoration: none;
            font-size: 0.9rem;
            border-bottom: 1px solid #C8860A;
            transition: 0.3s;
        }

        .btn-back:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <div class="imperial-card">
        <h1>صالة العبور</h1>
        <p class="msg">
            مرحباً بك في المنطقة المؤمنة لـ <span class="highlight">AlQurmani X</span>.<br>
            يتم الآن مزامنة البوابات مع نظام <span class="highlight">Main</span> المعتمد.<br>
            <span class="highlight">برجاء الانتظار.. سيتم إعادتك تلقائياً بعد اكتمال المعاينة.</span>
        </p>

        <div class="progress-container">
            <div class="progress-fill"></div>
        </div>

        <a href="main.html" class="btn-back">العودة يدوياً الآن</a>
    </div>

</body>
</html>
