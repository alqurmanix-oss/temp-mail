<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlQurmani X | Processing</title>
    
    <style>
        :root { --gold: linear-gradient(135deg, #C8860A, #FFD700); --bg: #020409; }
        body { background: var(--bg); color: #F5F0DC; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.5s; text-align: center; overflow: hidden; }
        .card { padding: 40px; background: rgba(8, 11, 24, 0.95); border-radius: 30px; border: 1px solid rgba(255, 215, 0, 0.1); max-width: 600px; width: 90%; box-shadow: 0 0 50px #000; }
        h1 { background: var(--gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; margin-bottom: 10px; }
        .status { font-size: 1.2rem; line-height: 1.6; color: #d4cfbc; }
        .highlight { color: #FFD700; font-weight: bold; }
        .ad-box { margin: 20px 0; min-height: 250px; display: flex; align-items: center; justify-content: center; }
        .loader { width: 100%; height: 2px; background: rgba(255,215,0,0.1); margin-top: 20px; overflow: hidden; }
        .fill { height: 100%; width: 0; background: var(--gold); animation: p 15s linear forwards; }
        @keyframes p { to { width: 100%; } }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="portalTitle">...</h1>
        <p class="status" id="statusMsg">...</p>

        <div class="ad-box">
            <ins style="width: 300px;height:250px" data-width="300" data-height="250" class="pa7acda22b7" data-domain="//data527.click" data-affquery="/683625d43596b818e752/a7acda22b7/?placementName=default"><script src="//data527.click/js/responsive.js" async></script></ins>
        </div>

        <div class="loader"><div class="fill"></div></div>
    </div>

    <script type="text/javascript" src="//cdn-server.live/b17fdc633185091d29e6/2104835e2b/?placementName=default"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoM-Aqq7VwTDx5ZeHmIpHM4sm2XM0WdKw",
            authDomain: "alqurmanix-15b92.firebaseapp.com",
            projectId: "alqurmanix-15b92",
            storageBucket: "alqurmanix-15b92.firebasestorage.app",
            messagingSenderId: "477352026568",
            appId: "1:477352026568:web:49f90cd3fc74b6948ba0fd"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // نظام الترجمة والذكاء
        const translations = {
            ar: { title: "جاري تجهيز {portal}", msg: "أهلاً {name}، نقوم الآن بضبط المعايير النهائية لضمان جودة تليق بك." },
            en: { title: "Preparing {portal}", msg: "Hello {name}, we are fine-tuning the parameters to ensure the best quality." },
            zh: { title: "正在准备 {portal}", msg: "你好 {name}，我们正在调整最终参数以确保质量。" }
            // يمكنك إضافة باقي الـ 11 لغة هنا بنفس النمط
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.body.style.opacity = "1";
                
                // سحب البيانات أوتوماتيكياً
                const name = user.displayName || "AlQurmani User";
                const portal = sessionStorage.getItem("active_portal") || "Section";
                const lang = (navigator.language || navigator.userLanguage).split('-')[0];
                const content = translations[lang] || translations.en;

                document.getElementById('portalTitle').innerText = content.title.replace("{portal}", portal);
                document.getElementById('statusMsg').innerHTML = content.msg.replace("{name}", `<span class="highlight">${name}</span>`);

                // التوجيه لـ main.html حصراً بعد 15 ثانية
                setTimeout(() => { window.location.href = "main.html"; }, 15000);
            } else {
                window.location.replace("index.html");
            }
        });
    </script>
</body>
</html>
