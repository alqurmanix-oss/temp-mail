<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlQurmani X | بوابات العبور</title>
    
    <script>
        // الأمان المطلق بتأخير ذكي (أهم جزء)
        window.onload = function() {
            setTimeout(() => {
                const accessKey = localStorage.getItem("portal_access_key");
                
                if (accessKey === "AlQurmani_VIP_2026") {
                    console.log("Welcome AlQurmani");
                    // مسح المفتاح للأمان بعد التأكد
                    localStorage.removeItem("portal_access_key");
                    
                    // العودة التلقائية بعد 15 ثانية
                    setTimeout(() => { window.location.href = "main.html"; }, 15000);
                } else {
                    // الطرد الفوري لو مفيش مفتاح
                    window.location.replace("main.html");
                }
            }, 500); // تأخير نصف ثانية لضمان قراءة الذاكرة
        };
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #C8860A, #FFD700, #FFE066, #B8720A);
            --bg: #020409;
        }
        body {
            background-color: var(--bg);
            color: #F5F0DC;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
        }
        .portal-card {
            position: relative;
            z-index: 10;
            padding: 60px 40px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(8, 11, 24, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            box-shadow: 0 0 100px #000;
            max-width: 600px;
        }
        h1 {
            font-family: 'Cinzel Decorative', cursive;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            margin-bottom: 25px;
        }
        .msg { font-size: 1.4rem; line-height: 1.8; margin-bottom: 40px; }
        .highlight { color: #FFD700; font-weight: bold; }
        .loader-bar { width: 100%; height: 3px; background: rgba(255, 215, 0, 0.1); margin: 20px 0; }
        .loader-fill { height: 100%; width: 0; background: var(--gold); animation: progress 15s linear forwards; }
        @keyframes progress { to { width: 100%; } }
        .back-link { display: inline-block; color: #FFD700; text-decoration: none; border-bottom: 1px solid #FFD700; }
    </style>
</head>
<body>
    <div class="portal-card">
        <h1>صالة السيادة</h1>
        <p class="msg">
            مرحباً بك في المنطقة المؤمنة لـ <span class="highlight">AlQurmani X</span>.<br>
            يتم الآن تجهيز البوابات الرقمية لسيادتكم.<br>
            <span class="highlight">تمتع بالرؤية.. سيعاد توجيهك تلقائياً بعد 15 ثانية.</span>
        </p>
        <div class="loader-bar"><div class="loader-fill"></div></div>
        <a href="main.html" class="back-link">العودة يدوياً الآن</a>
    </div>
</body>
</html>
