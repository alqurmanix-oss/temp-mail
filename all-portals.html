<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlQurmani X | نظام المعالجة الرقمية</title>
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #C8860A, #FFD700, #FFE066, #B8720A);
            --bg: #020409;
        }
        body {
            background-color: var(--bg);
            color: #F5F0DC;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
            opacity: 0; /* مخفية للأمان */
            transition: opacity 1s ease;
        }
        .processing-card {
            padding: 50px 30px;
            border: 1px solid rgba(255, 215, 0, 0.1);
            background: rgba(8, 11, 24, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 40px;
            box-shadow: 0 0 100px #000;
            max-width: 600px;
            width: 90%;
        }
        .spinner {
            width: 60px; height: 60px;
            border: 3px solid rgba(255, 215, 0, 0.1);
            border-top: 3px solid #FFD700;
            border-radius: 50%;
            margin: 0 auto 30px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        h1 {
            font-size: 1.8rem;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }
        .status-text { font-size: 1.2rem; line-height: 1.8; color: #d4cfbc; margin-bottom: 30px; }
        .highlight { color: #FFD700; font-weight: bold; }
        
        .timer-box { font-size: 0.9rem; color: #888; margin-top: 20px; }
        .progress-bar { width: 100%; height: 2px; background: rgba(255, 215, 0, 0.05); margin-top: 15px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0; background: var(--gold); animation: load 30s linear forwards; }
        @keyframes load { to { width: 100%; } }

        .btn-back {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 25px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            color: #FFD700;
            text-decoration: none;
            border-radius: 50px;
            font-size: 0.9rem;
            transition: 0.3s;
        }
        .btn-back:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="processing-card">
        <div class="spinner"></div>
        <h1>جاري تهيئة الاتصال الرقمي</h1>
        <p class="status-text">
            نحن الآن نقوم بضبط المعايير النهائية لضمان تجربة <span class="highlight">آمنة ومستقرة</span>.<br>
            دقة التفاصيل هي ما يميزنا، والانتظار قليلاً يضمن لك جودة تليق بك.<br>
            <span class="highlight">سيتم إعادتك تلقائياً بعد اكتمال المزامنة.</span>
        </p>

        <div class="timer-box">المتبقي: 30 ثانية تقريباً</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>

        <a href="main.html" class="btn-back">العودة للرئيسية الآن</a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCoM-Aqq7VwTDx5ZeHmIpHM4sm2XM0WdKw",
            authDomain: "alqurmanix-15b92.firebaseapp.com",
            projectId: "alqurmanix-15b92",
            storageBucket: "alqurmanix-15b92.firebasestorage.app",
            messagingSenderId: "477352026568",
            appId: "1:477352026568:web:49f90cd3fc74b6948ba0fd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // مستخدم مسجل -> أظهر الصفحة
                document.body.style.opacity = "1";
                // عداد الـ 30 ثانية
                setTimeout(() => { window.location.href = "main.html"; }, 30000);
            } else {
                // متسلل -> طرد فوراً
                window.location.replace("index.html");
            }
        });
    </script>
</body>
</html>
