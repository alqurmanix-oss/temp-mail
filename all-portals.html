<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlQurmani X | مركز القيادة</title>
    
    <style>
        :root {
            --gold: linear-gradient(135deg, #C8860A, #FFD700, #FFE066, #B8720A);
            --bg: #020409;
        }
        body {
            background-color: var(--bg);
            color: #F5F0DC;
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            text-align: center;
            opacity: 0; /* الصفحة مخفية تماماً لحين التأكد من الهوية */
            transition: opacity 1s ease-in-out;
        }
        .portal-card {
            padding: 60px 40px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            background: rgba(8, 11, 24, 0.95);
            backdrop-filter: blur(25px);
            border-radius: 30px;
            box-shadow: 0 0 100px #000;
            max-width: 650px;
            position: relative;
        }
        h1 {
            font-family: 'Cinzel Decorative', cursive;
            background: var(--gold);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 3rem;
            margin-bottom: 25px;
        }
        .msg { font-size: 1.4rem; line-height: 1.8; margin-bottom: 40px; }
        .highlight { color: #FFD700; font-weight: bold; }
        .loader-bar { width: 100%; height: 4px; background: rgba(255, 215, 0, 0.1); margin: 25px 0; overflow: hidden; border-radius: 10px; }
        .loader-fill { height: 100%; width: 0; background: var(--gold); animation: progress 30s linear forwards; }
        @keyframes progress { to { width: 100%; } }
        .back-link { 
            display: inline-block; 
            color: #FFD700; 
            text-decoration: none; 
            border: 1px solid #C8860A; 
            padding: 12px 35px; 
            border-radius: 50px; 
            font-weight: bold;
            transition: 0.3s; 
        }
        .back-link:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(255, 215, 0, 0.4); }
    </style>
</head>
<body>

    <div class="portal-card">
        <h1>صالة السيادة</h1>
        <p class="msg">
            مرحباً بك في المنطقة المؤمنة لـ <span class="highlight">AlQurmani X</span>.<br>
            تم التحقق من هويتك عبر بروتوكولاتنا الرقمية.<br>
            <span class="highlight">أمامك 30 ثانية للمعاينة قبل العودة التلقائية لـ Main.</span>
        </p>
        <div class="loader-bar"><div class="loader-fill"></div></div>
        <a href="main.html" class="back-link">العودة يدوياً الآن</a>
    </div>

    <script type="module">
        // استيراد Firebase المباشر
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // إعدادات مشروعك الحقيقية التي أرسلتها
        const firebaseConfig = {
            apiKey: "AIzaSyCoM-Aqq7VwTDx5ZeHmIpHM4sm2XM0WdKw",
            authDomain: "alqurmanix-15b92.firebaseapp.com",
            projectId: "alqurmanix-15b92",
            storageBucket: "alqurmanix-15b92.firebasestorage.app",
            messagingSenderId: "477352026568",
            appId: "1:477352026568:web:49f90cd3fc74b6948ba0fd"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // مراقب الحالة: القاضي والجلاد
        onAuthStateChanged(auth, (user) => {
            if (user) {
                // المستخدم مسجل دخول فعلاً -> أظهر الفخامة
                document.body.style.opacity = "1";

                // العودة التلقائية لصفحة main بعد 30 ثانية
                setTimeout(() => {
                    window.location.href = "main.html";
                }, 30000);
            } else {
                // مش مسجل دخول أو فاتح الرابط "تسلل" -> طرد فوري لـ index.html
                window.location.replace("index.html");
            }
        });
    </script>
</body>
</html>
