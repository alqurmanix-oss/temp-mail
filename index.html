<style>
/* ═══════════════════════════════════════
   ROOT VARIABLES
═══════════════════════════════════════ */
:root{
  --g1:#FFD700;--g2:#FFC200;--g3:#FFAA00;--g4:#FFE566;--g5:#F5A623;--g6:#E8940A;--g7:#FFF0A0;
  --neon:#00ff88;--neon2:#00dd77;
  --bg:#010308;--bg2:#030810;--bg3:#050d1a;
  --card:rgba(6,12,24,0.96);--card2:rgba(8,16,30,0.98);
  --bord:rgba(255,210,0,0.18);--bord2:rgba(255,210,0,0.32);
  --sh:0 0 60px rgba(255,165,0,0.12),0 12px 50px rgba(0,0,0,0.8);
  --fh:'Cinzel Decorative',serif;--fb:'Tajawal',sans-serif;--fm:'Montserrat',sans-serif;
  --r:16px;--tr:.3s ease;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{min-height:100vh;background:var(--bg);font-family:var(--fb);color:#e8dcc8;overflow-x:hidden;position:relative}

/* ═══════════════════════════════════════
   BACKGROUND LAYERS
═══════════════════════════════════════ */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 90% 60% at 50% -10%,rgba(255,180,0,.07) 0%,transparent 65%),
    radial-gradient(ellipse 60% 45% at 90% 95%,rgba(255,130,0,.05) 0%,transparent 55%),
    radial-gradient(ellipse 45% 35% at 5% 80%,rgba(255,200,0,.04) 0%,transparent 50%),
    radial-gradient(ellipse 30% 25% at 50% 50%,rgba(0,30,80,.4) 0%,transparent 70%),
    linear-gradient(145deg,#010308 0%,#030912 40%,#060f1e 70%,#020509 100%);
}
body::after{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    repeating-linear-gradient(0deg,transparent,transparent 40px,rgba(255,200,0,.012) 40px,rgba(255,200,0,.012) 41px),
    repeating-linear-gradient(90deg,transparent,transparent 40px,rgba(255,200,0,.008) 40px,rgba(255,200,0,.008) 41px);
}

/* ═══════════════════════════════════════
   PARTICLES
═══════════════════════════════════════ */
#ptc{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.gp{
  position:absolute;border-radius:50%;
  animation:fpA linear infinite;
  will-change:transform,opacity;
}
@keyframes fpA{
  0%  {transform:translateY(0)   translateX(0)   scale(1);  opacity:.9}
  20% {transform:translateY(-40px) translateX(15px) scale(1.4)}
  50% {transform:translateY(-110px)translateX(-20px)scale(.8);opacity:.45}
  80% {transform:translateY(-170px)translateX(12px) scale(1.1)}
  100%{transform:translateY(-240px)translateX(-5px)scale(.3); opacity:0}
}
/* خطوط الليزر الأمنية */
#laser-wrap{position:fixed;inset:0;z-index:2;pointer-events:none;display:none}
#laser-wrap.active{display:block}
.laser-line{
  position:absolute;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent 0%,rgba(0,255,136,0) 5%,rgba(0,255,136,.7) 30%,rgba(0,255,136,1) 50%,rgba(0,255,136,.7) 70%,rgba(0,255,136,0) 95%,transparent 100%);
  box-shadow:0 0 12px rgba(0,255,136,.6),0 0 30px rgba(0,255,136,.3);
  animation:laserScan .6s linear forwards;
}
@keyframes laserScan{
  0%  {top:10%;opacity:0}
  10% {opacity:1}
  90% {opacity:1}
  100%{top:90%;opacity:0}
}

/* ═══════════════════════════════════════
   LAYOUT
═══════════════════════════════════════ */
.page{position:relative;z-index:5;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 20px 80px}

/* ═══════════════════════════════════════
   TOPBAR
═══════════════════════════════════════ */
.topbar{
  width:100%;max-width:1120px;
  display:flex;justify-content:space-between;align-items:center;
  padding:22px 0 0;
}

/* ── Online indicator ── */
.online-wrap{
  display:flex;align-items:center;gap:10px;
  background:rgba(0,255,136,.05);
  border:1px solid rgba(0,255,136,.18);
  border-radius:40px;padding:7px 18px;
  backdrop-filter:blur(10px);
}
.led{
  width:11px;height:11px;border-radius:50%;
  background:var(--neon);
  box-shadow:0 0 8px var(--neon),0 0 18px var(--neon),0 0 35px rgba(0,255,136,.4);
  animation:ledPulse 1.8s ease-in-out infinite;
}
@keyframes ledPulse{
  0%,100%{box-shadow:0 0 8px var(--neon),0 0 18px var(--neon),0 0 35px rgba(0,255,136,.4);opacity:1}
  50%{box-shadow:0 0 3px var(--neon),0 0 7px var(--neon);opacity:.4}
}
.online-txt{font-size:13px;font-weight:700;color:var(--neon);letter-spacing:1.2px;text-shadow:0 0 10px var(--neon);font-family:var(--fm)}

/* ── Globe + Lang ── */
.lang-area{position:relative;display:flex;align-items:center;gap:12px}

.globe-btn{
  cursor:pointer;background:none;border:none;padding:0;
  display:flex;align-items:center;gap:9px;
  position:relative;
}
.globe-sphere{
  width:48px;height:48px;border-radius:50%;
  background:
    radial-gradient(circle at 32% 30%,#44aaff 0%,#1166dd 35%,#0033aa 65%,#001255 100%);
  box-shadow:
    0 0 18px rgba(30,130,255,.5),
    inset -6px -6px 12px rgba(0,0,60,.55),
    inset 3px 3px 8px rgba(120,180,255,.22);
  position:relative;overflow:hidden;
  animation:globeSpin 10s linear infinite;
}
.globe-sphere::before{
  content:'';position:absolute;inset:0;border-radius:50%;
  background:
    repeating-linear-gradient(0deg,transparent 0,transparent 5px,rgba(255,255,255,.055) 5px,rgba(255,255,255,.055) 6px),
    repeating-linear-gradient(90deg,transparent 0,transparent 9px,rgba(255,255,255,.04) 9px,rgba(255,255,255,.04) 10px);
}
.globe-sphere::after{
  content:'';position:absolute;
  top:7px;left:10px;width:14px;height:9px;
  background:rgba(255,255,255,.18);border-radius:50%;filter:blur(3px);
}
@keyframes globeSpin{
  0%{filter:hue-rotate(0deg) brightness(1)}
  50%{filter:hue-rotate(10deg) brightness(1.05)}
  100%{filter:hue-rotate(0deg) brightness(1)}
}
.globe-label{font-size:12px;font-weight:800;color:#d8e8ff;display:flex;align-items:center;gap:5px;font-family:var(--fm)}
#cFlag{font-size:18px}

/* ── FAQ icon ── */
.faq-btn{
  width:36px;height:36px;border-radius:50%;
  border:2px solid;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:900;text-decoration:none;
  animation:faqCycle 3s linear infinite;
  transition:transform var(--tr);
}
.faq-btn:hover{transform:scale(1.15)}
@keyframes faqCycle{
  0%  {color:#FFD700;border-color:#FFD700;box-shadow:0 0 10px #FFD700,0 0 20px rgba(255,215,0,.3)}
  25% {color:#00ff88;border-color:#00ff88;box-shadow:0 0 10px #00ff88,0 0 20px rgba(0,255,136,.3)}
  50% {color:#ff44aa;border-color:#ff44aa;box-shadow:0 0 10px #ff44aa,0 0 20px rgba(255,68,170,.3)}
  75% {color:#00bbff;border-color:#00bbff;box-shadow:0 0 10px #00bbff,0 0 20px rgba(0,187,255,.3)}
  100%{color:#FFD700;border-color:#FFD700;box-shadow:0 0 10px #FFD700,0 0 20px rgba(255,215,0,.3)}
}

/* ── Language Dropdown ── */
.lang-dd{
  display:none;
  position:absolute;top:58px;left:0;
  background:rgba(4,9,20,.98);
  border:1px solid var(--bord2);
  border-radius:16px;padding:10px 0;
  min-width:165px;z-index:999;
  box-shadow:0 16px 60px rgba(0,0,0,.9),0 0 30px rgba(255,200,0,.08);
  backdrop-filter:blur(25px);
}
.lang-dd.open{display:block;animation:ddSlide .22s ease}
@keyframes ddSlide{from{opacity:0;transform:translateY(-8px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
.lang-opt{
  display:flex;align-items:center;gap:11px;
  padding:10px 20px;cursor:pointer;
  font-size:13px;font-weight:700;color:#aab0c0;
  transition:all .18s;font-family:var(--fm);
}
.lang-opt:hover{background:rgba(255,200,0,.09);color:var(--g1);padding-right:26px}
.lang-opt .lf{font-size:17px}

/* ═══════════════════════════════════════
   LOGO
═══════════════════════════════════════ */
.logo-wrap{margin:42px 0 8px;text-align:center;position:relative}
.logo-txt{
  font-family:var(--fh);
  font-size:clamp(2rem,5.5vw,3.8rem);
  font-weight:900;letter-spacing:5px;
  animation:logoGold 5s ease-in-out infinite;
  text-shadow:0 0 30px rgba(255,190,0,.5),0 0 60px rgba(255,140,0,.2),0 6px 24px rgba(0,0,0,.9);
  user-select:none;
}
@keyframes logoGold{
  0%  {color:#FFD700}
  20% {color:#FFC200}
  40% {color:#FFAA00}
  60% {color:#FFE566}
  80% {color:#F5A623}
  100%{color:#FFD700}
}
.logo-sub{
  font-size:11px;font-weight:600;color:rgba(255,200,0,.4);
  letter-spacing:4px;font-family:var(--fm);margin-top:4px;
  text-transform:uppercase;
}

/* ═══════════════════════════════════════
   CARD
═══════════════════════════════════════ */
.card{
  width:100%;max-width:500px;
  background:var(--card2);
  border:1px solid var(--bord);
  border-radius:28px;
  padding:38px 36px;
  box-shadow:var(--sh),inset 0 1px 0 rgba(255,215,0,.06);
  backdrop-filter:blur(35px);
  position:relative;overflow:hidden;
  margin-top:12px;
}
.card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--g3),var(--g1),var(--g2),var(--g3),transparent);
  border-radius:28px 28px 0 0;
  animation:topLine 3s ease infinite alternate;
}
@keyframes topLine{from{opacity:.6}to{opacity:1}}
.card::after{
  content:'';position:absolute;inset:0;border-radius:28px;pointer-events:none;
  background:radial-gradient(ellipse 80% 40% at 50% 0%,rgba(255,200,0,.04) 0%,transparent 60%);
}

/* ═══════════════════════════════════════
   TABS
═══════════════════════════════════════ */
.tabs{
  display:flex;gap:0;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,200,0,.1);
  border-radius:16px;padding:5px;
  margin-bottom:30px;
  position:relative;z-index:2;
}
.tab-btn{
  flex:1;padding:12px 10px;
  background:none;border:none;border-radius:13px;
  font-family:var(--fb);font-size:15px;font-weight:700;
  color:#666;cursor:pointer;
  transition:all var(--tr);letter-spacing:.5px;
}
.tab-btn.active{
  background:linear-gradient(140deg,rgba(255,185,0,.2),rgba(255,140,0,.08));
  color:var(--g1);
  box-shadow:0 2px 20px rgba(255,185,0,.15),inset 0 1px 0 rgba(255,215,0,.12);
  border:1px solid rgba(255,200,0,.22);
}
.tab-panel{display:none;animation:panelIn .3s ease}
.tab-panel.active{display:block}
@keyframes panelIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ═══════════════════════════════════════
   FORM FIELDS
═══════════════════════════════════════ */
.fg{margin-bottom:20px;position:relative}
.fl{
  display:block;font-size:11.5px;font-weight:700;
  color:rgba(255,195,0,.65);margin-bottom:8px;
  letter-spacing:1px;font-family:var(--fm);text-transform:uppercase;
}
.fi{
  width:100%;padding:14px 18px;
  background:rgba(255,255,255,.035);
  border:1px solid rgba(255,195,0,.13);
  border-radius:14px;
  color:#e8dcc8;font-family:var(--fb);font-size:15px;
  outline:none;transition:all var(--tr);direction:ltr;
}
.fi:focus{
  border-color:rgba(255,195,0,.5);
  background:rgba(255,195,0,.04);
  box-shadow:0 0 0 3px rgba(255,180,0,.1),0 0 25px rgba(255,180,0,.06);
}
.fi::placeholder{color:rgba(200,175,115,.28)}

/* ═══════════════════════════════════════
   PASSWORD STRENGTH
═══════════════════════════════════════ */
.sb-wrap{height:5px;background:rgba(255,255,255,.07);border-radius:5px;margin:9px 0 3px;overflow:hidden}
#sb{height:100%;width:0%;border-radius:5px;transition:width .45s cubic-bezier(.4,0,.2,1),background .45s}
.pw-rules{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.pw-r{font-size:11.5px;display:flex;align-items:center;gap:8px;color:#444;transition:color var(--tr);font-family:var(--fm)}
.pw-r .ri{font-size:13px;min-width:14px}
#cmatch{font-size:12px;margin-top:6px;font-weight:700;font-family:var(--fm)}

/* ═══════════════════════════════════════
   BUTTONS
═══════════════════════════════════════ */
.btn-main{
  width:100%;padding:15px;margin-top:10px;
  background:linear-gradient(135deg,#b8760a,#FFD700,#e09500,#FFD700);
  background-size:200% 200%;
  border:none;border-radius:15px;
  font-family:var(--fb);font-size:16px;font-weight:900;
  color:#1a0a00;cursor:pointer;letter-spacing:.8px;
  animation:btnShim 3.5s ease infinite;
  transition:transform .2s,box-shadow .2s;
  box-shadow:0 5px 25px rgba(255,180,0,.35),0 2px 8px rgba(0,0,0,.4);
  position:relative;overflow:hidden;
}
.btn-main::before{
  content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,.18),transparent);
  transform:skewX(-20deg);animation:btnGloss 4s ease infinite;
}
@keyframes btnGloss{0%,100%{left:-60%}50%{left:120%}}
@keyframes btnShim{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.btn-main:hover{transform:translateY(-3px);box-shadow:0 10px 35px rgba(255,180,0,.5),0 4px 12px rgba(0,0,0,.4)}
.btn-main:active{transform:translateY(-1px)}
.btn-main:disabled{opacity:.5;cursor:not-allowed;transform:none;animation:none}

.btn-forgot{
  background:none;border:none;cursor:pointer;
  color:rgba(255,180,0,.55);font-size:12px;
  font-family:var(--fb);text-decoration:underline;
  margin-top:9px;transition:color var(--tr);
  display:block;text-align:center;width:100%;
}
.btn-forgot:hover{color:var(--g1)}

/* ═══════════════════════════════════════
   FOOTER LINKS
═══════════════════════════════════════ */
.foot{
  display:flex;justify-content:center;align-items:center;
  gap:22px;flex-wrap:wrap;margin-top:28px;
}
.foot-link{
  font-size:13px;font-weight:700;text-decoration:none;
  transition:all .3s;letter-spacing:.5px;font-family:var(--fm);
}
.foot-support{animation:suppCycle 4.5s linear infinite}
@keyframes suppCycle{0%{color:#FFD700}25%{color:#ff44aa}50%{color:#00ccff}75%{color:#00ff88}100%{color:#FFD700}}
.foot-sec{color:rgba(255,110,0,.8)}.foot-sec:hover{color:#ff8800}
.foot-about{color:rgba(170,150,255,.8)}.foot-about:hover{color:#bb99ff}
.foot-sep{color:rgba(255,195,0,.18);font-size:14px}

/* ═══════════════════════════════════════
   SPINNER
═══════════════════════════════════════ */
.spin{
  display:inline-block;width:16px;height:16px;
  border:2.5px solid rgba(26,10,0,.25);
  border-top-color:#1a0a00;border-radius:50%;
  animation:rot .65s linear infinite;
  vertical-align:middle;margin-right:6px;
}
@keyframes rot{to{transform:rotate(360deg)}}

/* ═══════════════════════════════════════
   MODAL OVERLAY
═══════════════════════════════════════ */
#mOv{
  display:none;position:fixed;inset:0;z-index:9999;
  background:rgba(0,0,0,.88);backdrop-filter:blur(22px);
  align-items:center;justify-content:center;
}
#mOv.on{display:flex;animation:ovIn .3s ease}
@keyframes ovIn{from{opacity:0}to{opacity:1}}

.mbox{
  width:92%;max-width:460px;
  border-radius:28px;padding:46px 40px 36px;
  position:relative;text-align:center;
  animation:mPop .45s cubic-bezier(.34,1.56,.64,1);
  overflow:hidden;
}
@keyframes mPop{from{opacity:0;transform:scale(.6) translateY(40px)}to{opacity:1;transform:scale(1) translateY(0)}}

/* Modal types */
.m-gold{
  background:linear-gradient(160deg,rgba(8,14,26,.99),rgba(16,11,3,.99));
  border:1px solid rgba(255,200,0,.4);
  box-shadow:0 0 80px rgba(255,180,0,.2),0 0 150px rgba(255,140,0,.1),inset 0 1px 0 rgba(255,215,0,.14),0 25px 70px rgba(0,0,0,.9);
}
.m-gold::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:28px 28px 0 0;background:linear-gradient(90deg,transparent,#FFD700,#FFC200,#FFD700,transparent);animation:topLine 2s ease infinite alternate}
.m-green{
  background:linear-gradient(160deg,rgba(4,14,10,.99),rgba(4,16,12,.99));
  border:1px solid rgba(0,255,136,.35);
  box-shadow:0 0 80px rgba(0,255,136,.15),0 0 150px rgba(0,200,100,.08),inset 0 1px 0 rgba(0,255,136,.12),0 25px 70px rgba(0,0,0,.9);
}
.m-green::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:28px 28px 0 0;background:linear-gradient(90deg,transparent,#00ff88,#00cc66,#00ff88,transparent);animation:topLine 2s ease infinite alternate}
.m-warn{
  background:linear-gradient(160deg,rgba(8,14,26,.99),rgba(18,9,3,.99));
  border:1px solid rgba(255,130,0,.38);
  box-shadow:0 0 70px rgba(255,100,0,.18),0 25px 70px rgba(0,0,0,.9);
}
.m-warn::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:28px 28px 0 0;background:linear-gradient(90deg,transparent,#ff8800,#ffaa00,#ff8800,transparent)}
.m-err{
  background:linear-gradient(160deg,rgba(8,14,26,.99),rgba(18,3,3,.99));
  border:1px solid rgba(255,50,50,.32);
  box-shadow:0 0 70px rgba(255,0,0,.14),0 25px 70px rgba(0,0,0,.9);
}
.m-err::before{content:'';position:absolute;top:0;left:0;right:0;height:2.5px;border-radius:28px 28px 0 0;background:linear-gradient(90deg,transparent,#ff4444,#ff0000,#ff4444,transparent)}
.m-info{
  background:linear-gradient(160deg,rgba(4,9,20,.99),rgba(3,8,18,.99));

<script type="module">

/* ── Firebase ── */
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import{getAnalytics}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";

/* ── Bridge (محاطة بـ Try لتجنب توقف الصفحة إذا كان الملف غير موجود) ── */
let sendToSecurityInternet = async () => {};
try {
  const bridge = await import("./bridge.client.v10.js");
  sendToSecurityInternet = bridge.sendToSecurityInternet;
} catch(e) { console.warn("Bridge module not found locally, continuing without it."); }

/* ── Firebase Config ── */
const app=initializeApp({
  apiKey:"AIzaSyBICr62Oa_-69hATpfFrdTDfO9WV4bVVvU",
  authDomain:"alqurmanix-d49f7.firebaseapp.com",
  projectId:"alqurmanix-d49f7",
  storageBucket:"alqurmanix-d49f7.firebasestorage.app",
  messagingSenderId:"1017946245702",
  appId:"1:1017946245702:web:575c425860c82166411847",
  measurementId:"G-5XN1NMG997"
});
getAnalytics(app);
const auth=getAuth(app),db=getFirestore(app);

/* ═══════════════════════════════════════════════════════
   SESSION DATA 
═══════════════════════════════════════════════════════ */
const _K="ALQURMANI_X_SECURE_VAULT_2026_V10",_S="ALQ_SALT_99";
async function _E(txt){
  const enc=new TextEncoder();
  const m=await crypto.subtle.importKey("raw",enc.encode(_K),{name:"PBKDF2"},false,["deriveKey"]);
  const k=await crypto.subtle.deriveKey(
    {name:"PBKDF2",salt:enc.encode(_S),iterations:100000,hash:"SHA-256"},
    m,{name:"AES-GCM",length:256},false,["encrypt"]
  );
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const c=await crypto.subtle.encrypt({name:"AES-GCM",iv},k,enc.encode(txt));
  return btoa(String.fromCharCode(...iv))+"."+btoa(String.fromCharCode(...new Uint8Array(c)));
}
async function _FP(){
  const raw=[navigator.userAgent,screen.width+"x"+screen.height,
    new Date().getTimezoneOffset(),navigator.hardwareConcurrency||0,
    navigator.deviceMemory||0].join("|");
  const buf=await crypto.subtle.digest("SHA-256",new TextEncoder().encode(raw));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}
const collectSessionData=async(phone=null)=>{
  const fp=await _FP();
  return{
    userId:"",email:"",phoneNumber:phone?await _E(phone):"",
    deviceFingerprint:fp,platform:navigator.platform||"unknown",
    appVersion:"1.0.1-CORE",userAgent:navigator.userAgent,
    ipAddress:"",country:"EG",status:"active",isPhoneVerified:false,
    lastActivity:new Date(),createdAt:new Date(),
    sessionId:crypto.randomUUID(),referralCode:"",deletionRequestTime:""
  };
};

/* ── handleResponse ── */
const handleResponse=r=>{
  if(!r)throw new Error("NO_RESPONSE");
  switch(r.status){
    case"OK":return true;
    case"BLOCKED":case"BLOCKED_EDGE":case"BLOCKED_GLOBAL":case"BLOCKED_GLOBAL_MESH":
      throw new Error("SECURITY_BLOCK");
    case"DENIED":throw new Error("UNAUTHORIZED");
    case"ERROR":throw new Error(r.message||"SERVER_ERROR");
    default:return true;
  }
};


/* ═══════════════════════════════════════════════════════
   UI & INTERACTIVITY LOGIC (المنطقة التي تم إصلاحها وإكمالها)
═══════════════════════════════════════════════════════ */

// 1. نظام النوافذ المنبثقة الفخمة (Modals)
window.showModal = function(type, title, text) {
    const ov = document.getElementById('mOv');
    const box = document.getElementById('mBox');
    const icn = document.getElementById('mIcon');
    const tit = document.getElementById('mTitle');
    const bod = document.getElementById('mBody');
    const acts = document.getElementById('mActs');

    box.className = 'mbox m-' + type;

    const icons = { gold: '👑', green: '✅', warn: '⚠️', err: '❌', info: '💠' };
    icn.innerText = icons[type] || '✨';

    tit.innerText = title;
    bod.innerText = text;

    acts.innerHTML = `<button class="mbtn" onclick="document.getElementById('mOv').classList.remove('on')">حسناً، فهمت</button>`;
    ov.classList.add('on');
};

// 2. نظام التبويبات (Tabs)
const tabBtns = document.querySelectorAll('.tab-btn');
const tabPanels = document.querySelectorAll('.tab-panel');
tabBtns.forEach(btn => {
    btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        tabPanels.forEach(p => p.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
    });
});

// 3. قائمة اللغات
const globeBtn = document.getElementById('globeBtn');
const langDd = document.getElementById('langDd');
const langs = [
    { c: 'AR', f: '🇸🇦', n: 'العربية' },
    { c: 'EN', f: '🇺🇸', n: 'English' }
];
langs.forEach(l => {
    const d = document.createElement('div');
    d.className = 'lang-opt';
    d.innerHTML = `<span class="lf">${l.f}</span> <span>${l.n}</span>`;
    d.onclick = () => {
        document.getElementById('cFlag').innerText = l.f;
        document.getElementById('cCode').innerText = l.c;
        langDd.classList.remove('open');
    };
    langDd.appendChild(d);
});
globeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    langDd.classList.toggle('open');
});
document.addEventListener('click', () => langDd.classList.remove('open'));

// 4. نظام الجزيئات (Particles)
const ptc = document.getElementById('ptc');
const colors = ['#FFD700', '#00ff88', '#00aaff', '#ff44aa'];
for(let i=0; i<40; i++) {
    let p = document.createElement('div');
    p.className = 'gp';
    p.style.width = Math.random() * 4 + 1 + 'px';
    p.style.height = p.style.width;
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.top = Math.random() * 100 + 'vh';
    p.style.animationDuration = Math.random() * 4 + 3 + 's';
    p.style.animationDelay = Math.random() * 3 + 's';
    p.style.boxShadow = `0 0 10px ${p.style.background}`;
    ptc.appendChild(p);
}

// 5. فحص قوة كلمة المرور
const rpw = document.getElementById('rpw');
const rconf = document.getElementById('rconf');
const sb = document.getElementById('sb');
const cmatch = document.getElementById('cmatch');
const rules = [
    { id: 'r1', regex: /.{8,}/ },
    { id: 'r2', regex: /[A-Z]/ },
    { id: 'r3', regex: /[a-z]/ },
    { id: 'r4', regex: /[0-9]/ },
    { id: 'r5', regex: /[^A-Za-z0-9]/ }
];

rpw.addEventListener('input', () => {
    let passed = 0;
    rules.forEach(r => {
        const el = document.getElementById(r.id);
        if(r.regex.test(rpw.value)) {
            el.style.color = '#00ff88';
            el.querySelector('.ri').innerText = '✅';
            passed++;
        } else {
            el.style.color = '#444';
            el.querySelector('.ri').innerText = '⭕';
        }
    });
    sb.style.width = (passed * 20) + '%';
    if(passed <= 2) sb.style.background = '#ff4444';
    else if(passed <= 4) sb.style.background = '#ffaa00';
    else sb.style.background = '#00ff88';
    checkMatch();
});

rconf.addEventListener('input', checkMatch);
function checkMatch() {
    if(!rconf.value) { cmatch.innerText = ''; return; }
    if(rpw.value === rconf.value) {
        cmatch.innerText = '✅ الكلمتان متطابقتان';
        cmatch.style.color = '#00ff88';
    } else {
        cmatch.innerText = '❌ الكلمتان غير متطابقتين';
        cmatch.style.color = '#ff4444';
    }
}

// 6. دوال التسجيل والدخول (Firebase + Zion)
const loginBtn = document.getElementById('loginBtn');
const registerBtn = document.getElementById('registerBtn');
const forgotBtn = document.getElementById('forgotBtn');

function setBtnLoading(btn, isLoading, originalText) {
    if(isLoading) {
        btn.disabled = true;
        btn.innerHTML = `<span class="spin"></span> جاري المعالجة...`;
    } else {
        btn.disabled = false;
        btn.innerHTML = originalText;
    }
}

// --- Login ---
loginBtn.addEventListener('click', async () => {
    const email = document.getElementById('lemail').value.trim();
    const pw = document.getElementById('lpw').value;
    if(!email || !pw) return showModal('warn', 'تنبيه', 'يرجى إدخال البريد الإلكتروني وكلمة السر.');

    setBtnLoading(loginBtn, true, 'دخول');
    try {
        const userCred = await signInWithEmailAndPassword(auth, email, pw);
        window._aqxUid = userCred.user.uid;
        window._aqxEmail = userCred.user.email;
        
        await runZion('LOGIN_SUCCESS');
        
        try {
            const sessionData = await collectSessionData();
            await sendToSecurityInternet('LOGIN', sessionData);
        } catch(e) {}

        showModal('green', 'تم الدخول بنجاح', 'مرحباً بك مجدداً في إمبراطورية القرماني إكس!');
    } catch(error) {
        await runZion('LOGIN_FAILED', { error: error.message });
        showModal('err', 'فشل الدخول', 'بيانات الدخول غير صحيحة أو الحساب غير موجود.');
    } finally {
        setBtnLoading(loginBtn, false, 'دخول');
    }
});

// --- Register ---
registerBtn.addEventListener('click', async () => {
    const email = document.getElementById('remail').value.trim();
    const pw = document.getElementById('rpw').value;
    const conf = document.getElementById('rconf').value;

    if(!email || !pw || !conf) return showModal('warn', 'تنبيه', 'يرجى تعبئة جميع الحقول.');
    if(pw !== conf) return showModal('err', 'خطأ', 'كلمات المرور غير متطابقة!');
    if(pw.length < 8) return showModal('warn', 'أمان ضعيف', 'يجب أن تحتوي كلمة السر على 8 أحرف على الأقل.');

    setBtnLoading(registerBtn, true, 'إنشاء حساب');
    try {
        const userCred = await createUserWithEmailAndPassword(auth, email, pw);
        window._aqxUid = userCred.user.uid;
        window._aqxEmail = userCred.user.email;

        await setDoc(doc(db, "users", userCred.user.uid), {
            email: userCred.user.email,
            createdAt: serverTimestamp(),
            role: "user",
            status: "active"
        });

        await runZion('REGISTER_SUCCESS');
        showModal('gold', 'تهانينا!', 'تم إنشاء حسابك الملكي بنجاح في منصة Alqurmani X.');
    } catch(error) {
        await runZion('REGISTER_FAILED', { error: error.message });
        showModal('err', 'حدث خطأ', error.message);
    } finally {
        setBtnLoading(registerBtn, false, 'إنشاء حساب');
    }
});

// --- Forgot Password ---
forgotBtn.addEventListener('click', async () => {
    const email = document.getElementById('lemail').value.trim();
    if(!email) return showModal('info', 'استعادة كلمة السر', 'يرجى إدخال بريدك الإلكتروني في حقل الدخول أولاً ثم اضغط هنا.');
    
    try {
        await sendPasswordResetEmail(auth, email);
        await runZion('PASSWORD_RESET_REQUESTED');
        showModal('green', 'تم الإرسال', 'راجع صندوق الوارد في بريدك الإلكتروني لإعادة تعيين كلمة السر.');
    } catch(error) {
        showModal('err', 'فشل الإرسال', 'تأكد من صحة البريد الإلكتروني المدخل.');
    }
});

// ليزر حماية إضافي عند محاولة التظليل والنسخ

</script>
