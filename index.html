<style>
:root{
  --gold1:#FFD700;--gold2:#FFC200;--gold3:#FFAA00;--gold4:#FFE066;
  --gold5:#F5A623;--gold6:#E8940A;--gold7:#FFF0A0;
  --neon:#00ff88;--bg:#020408;--card:rgba(8,14,26,0.97);
  --border:rgba(255,215,0,0.22);
  --shadow:0 0 50px rgba(255,170,0,0.15),0 8px 40px rgba(0,0,0,0.75);
  --fh:'Cinzel Decorative',serif;--fb:'Tajawal',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg);font-family:var(--fb);color:#e8dcc8;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 80% 55% at 50% -5%,rgba(255,175,0,.09) 0%,transparent 68%),
    radial-gradient(ellipse 55% 40% at 85% 92%,rgba(255,130,0,.06) 0%,transparent 55%),
    radial-gradient(ellipse 40% 30% at 8% 78%,rgba(255,195,0,.05) 0%,transparent 50%),
    linear-gradient(140deg,#020408 0%,#05091a 45%,#07101e 72%,#030609 100%)}
#ptc{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.gp{position:absolute;animation:fp linear infinite;user-select:none;pointer-events:none;display:flex;align-items:center;justify-content:center}
@keyframes fp{
  0%  {transform:translateY(0px)   translateX(0px)   scale(1) rotate(0deg);  opacity:.9}
  25% {transform:translateY(-55px) translateX(22px)  scale(1.3) rotate(45deg)}
  60% {transform:translateY(-120px)translateX(-16px) scale(.75) rotate(90deg);opacity:.35}
  100%{transform:translateY(-220px)translateX(10px)  scale(.3) rotate(180deg); opacity:0}
}
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 70px}
.topbar{width:100%;max-width:1080px;display:flex;justify-content:space-between;align-items:center;padding:20px 0 0}
.online{display:flex;align-items:center;gap:9px;background:rgba(0,255,136,.06);border:1px solid rgba(0,255,136,.2);border-radius:30px;padding:7px 16px;backdrop-filter:blur(8px)}
.dot{width:11px;height:11px;border-radius:50%;background:var(--neon);box-shadow:0 0 10px var(--neon),0 0 20px var(--neon);animation:pulse 1.6s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 10px var(--neon),0 0 22px var(--neon);opacity:1}50%{box-shadow:0 0 3px var(--neon),0 0 7px var(--neon);opacity:.45}}
.online-txt{font-size:13px;font-weight:700;color:var(--neon);letter-spacing:1px;text-shadow:0 0 8px var(--neon)}
.lang-wrap{position:relative;display:flex;align-items:center;gap:10px}
.globe-btn{cursor:pointer;background:none;border:none;display:flex;align-items:center;gap:8px;padding:0}
.globe{width:46px;height:46px;border-radius:50%;
  background:radial-gradient(circle at 34% 34%,#2299ff 0%,#0055dd 38%,#002288 72%,#001050 100%);
  box-shadow:0 0 14px rgba(30,120,255,.45),inset -5px -5px 10px rgba(0,0,50,.5),inset 3px 3px 7px rgba(110,170,255,.2);
  animation:gSpin 9s linear infinite;position:relative;overflow:hidden}
.globe::before{content:'';position:absolute;inset:0;border-radius:50%;
  background:repeating-linear-gradient(0deg,transparent 0,transparent 5px,rgba(255,255,255,.06) 5px,rgba(255,255,255,.06) 6px),
             repeating-linear-gradient(90deg,transparent 0,transparent 9px,rgba(255,255,255,.04) 9px,rgba(255,255,255,.04) 10px)}
.globe::after{content:'';position:absolute;top:6px;left:11px;width:13px;height:8px;background:rgba(255,255,255,.16);border-radius:50%;filter:blur(2px)}
@keyframes gSpin{0%{filter:hue-rotate(0deg)}100%{filter:hue-rotate(18deg)}}
.lang-cur{font-size:13px;font-weight:900;color:#e8dcc8;display:flex;align-items:center;gap:5px}
#curFlag{font-size:20px}
.lang-dd{display:none;position:absolute;top:58px;left:0;background:rgba(5,10,22,.98);border:1px solid var(--border);border-radius:14px;padding:8px 0;min-width:155px;z-index:1000;box-shadow:0 12px 55px rgba(0,0,0,.85),0 0 22px rgba(255,195,0,.08);backdrop-filter:blur(22px)}
.lang-dd.open{display:block;animation:ddIn .25s ease}
@keyframes ddIn{from{opacity:0;transform:translateY(-10px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.lang-item{display:flex;align-items:center;gap:10px;padding:9px 18px;color:#bbb;font-size:13px;font-weight:700;transition:all .2s;cursor:pointer;user-select:none}
.lang-item:hover{background:rgba(255,195,0,.1);color:var(--gold1)}
.lf{font-size:18px}
.faq-ico{cursor:pointer;font-size:21px;font-weight:900;width:38px;height:38px;display:flex;align-items:center;justify-content:center;border-radius:50%;border:2px solid;animation:faqC 3s linear infinite;text-decoration:none}
@keyframes faqC{
  0%  {color:#FFD700;border-color:#FFD700;box-shadow:0 0 10px #FFD700}
  25% {color:#00ff88;border-color:#00ff88;box-shadow:0 0 10px #00ff88}
  50% {color:#ff4488;border-color:#ff4488;box-shadow:0 0 10px #ff4488}
  75% {color:#00aaff;border-color:#00aaff;box-shadow:0 0 10px #00aaff}
  100%{color:#FFD700;border-color:#FFD700;box-shadow:0 0 10px #FFD700}
}
.logo-sec{margin:38px 0 10px;text-align:center}
.logo{font-family:var(--fh);font-size:clamp(2.1rem,5.5vw,4rem);font-weight:900;letter-spacing:4px;
  animation:gShift 4s ease-in-out infinite;user-select:none;
  text-shadow:0 0 22px rgba(255,175,0,.5),0 0 55px rgba(255,135,0,.18),0 4px 22px rgba(0,0,0,.9)}
@keyframes gShift{0%{color:#FFD700}14%{color:#FFC200}28%{color:#FFAA00}42%{color:#FFE066}56%{color:#F5A623}70%{color:#E8940A}85%{color:#FFF0A0}100%{color:#FFD700}}
.card{width:100%;max-width:490px;background:var(--card);border:1px solid var(--border);border-radius:24px;
  padding:36px 32px;box-shadow:var(--shadow),inset 0 1px 0 rgba(255,215,0,.07);
  backdrop-filter:blur(30px);position:relative;overflow:hidden;margin-top:10px}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold2),var(--gold1),var(--gold3),transparent);border-radius:24px 24px 0 0}
.tabs{display:flex;background:rgba(255,255,255,.03);border:1px solid rgba(255,195,0,.11);border-radius:14px;padding:4px;margin-bottom:28px}
.tab-btn{flex:1;padding:11px 10px;background:none;border:none;border-radius:11px;
  font-family:var(--fb);font-size:15px;font-weight:700;color:#777;cursor:pointer;transition:all .3s;letter-spacing:.5px}
.tab-btn.active{background:linear-gradient(135deg,rgba(255,175,0,.18),rgba(255,135,0,.07));
  color:var(--gold1);box-shadow:0 2px 16px rgba(255,175,0,.14);border:1px solid rgba(255,195,0,.2)}
.tab-panel{display:none}
.tab-panel.active{display:block;animation:fadeUp .35s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fg{margin-bottom:18px}
.fl{display:block;font-size:12px;font-weight:700;color:rgba(255,195,0,.7);margin-bottom:7px;letter-spacing:.8px}
.fi{width:100%;padding:13px 16px;background:rgba(255,255,255,.04);border:1px solid rgba(255,195,0,.14);
  border-radius:12px;color:#e8dcc8;font-family:var(--fb);font-size:15px;outline:none;transition:all .3s;direction:ltr}
.fi:focus{border-color:rgba(255,195,0,.5);background:rgba(255,195,0,.04);box-shadow:0 0 0 3px rgba(255,175,0,.09)}
.fi::placeholder{color:rgba(200,175,115,.3)}
.phone-row{display:flex;gap:8px}
.pcode-wrap{position:relative;width:130px;flex-shrink:0}
.pcode{width:100%;padding:13px 26px 13px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,195,0,.14);
  border-radius:12px;color:#e8dcc8;font-family:var(--fb);font-size:13px;outline:none;transition:all .3s;
  cursor:pointer;-webkit-appearance:none;appearance:none}
.pcode:focus{border-color:rgba(255,195,0,.5);background:rgba(255,195,0,.04);box-shadow:0 0 0 3px rgba(255,175,0,.09)}
.pcode-arr{position:absolute;left:8px;top:50%;transform:translateY(-50%);color:rgba(255,195,0,.5);pointer-events:none;font-size:11px}
.btn-verify{width:100%;padding:12px;background:linear-gradient(135deg,rgba(255,175,0,.1),rgba(255,130,0,.05));
  border:1px solid rgba(255,195,0,.22);border-radius:12px;font-family:var(--fb);font-size:14px;
  font-weight:700;color:var(--gold2);cursor:pointer;transition:all .3s;margin-top:8px;letter-spacing:.5px}
.btn-verify:hover{background:linear-gradient(135deg,rgba(255,175,0,.2),rgba(255,130,0,.1));box-shadow:0 0 16px rgba(255,175,0,.14);transform:translateY(-1px)}
.btn-verify:disabled{opacity:.4;cursor:not-allowed;transform:none}
.otp-wrap{display:none;margin-top:12px}
.otp-wrap.show{display:block;animation:fadeUp .3s ease}
.otp-note{font-size:12px;color:rgba(0,255,136,.85);text-align:center;margin-bottom:8px;text-shadow:0 0 8px rgba(0,255,136,.35)}
.otp-fi{width:100%;padding:14px;background:rgba(0,255,136,.04);border:1.5px solid rgba(0,255,136,.22);
  border-radius:12px;color:#e8dcc8;font-family:var(--fb);font-size:20px;outline:none;transition:all .3s;
  direction:ltr;letter-spacing:7px;text-align:center}
.otp-fi:focus{border-color:rgba(0,255,136,.6);background:rgba(0,255,136,.06);box-shadow:0 0 0 3px rgba(0,255,136,.1)}
.btn-otp{width:100%;padding:12px;background:linear-gradient(135deg,rgba(0,255,136,.14),rgba(0,200,100,.07));
  border:1.5px solid rgba(0,255,136,.28);border-radius:12px;font-family:var(--fb);font-size:14px;
  font-weight:700;color:#00ff88;cursor:pointer;transition:all .3s;margin-top:8px;text-shadow:0 0 8px rgba(0,255,136,.35)}
.btn-otp:hover{background:linear-gradient(135deg,rgba(0,255,136,.24),rgba(0,200,100,.14));box-shadow:0 0 18px rgba(0,255,136,.18);transform:translateY(-1px)}
.btn-otp:disabled{opacity:.4;cursor:not-allowed;transform:none}
.phone-ok{display:none;font-size:12px;font-weight:700;color:#00ff88;text-shadow:0 0 10px #00ff88;margin-top:7px;text-align:center}
.phone-ok.show{display:block;animation:fadeUp .3s ease}
.sb-wrap{height:6px;background:rgba(255,255,255,.07);border-radius:6px;margin:10px 0 4px;overflow:hidden}
#sb{height:100%;width:0%;border-radius:6px;transition:width .4s,background .4s}
.pw-rules{margin-top:10px;display:flex;flex-direction:column;gap:4px}
.pw-rule{font-size:12px;display:flex;align-items:center;gap:7px;color:#555;transition:color .3s}
.ri{font-size:14px}
#cmatch{font-size:12px;margin-top:5px;font-weight:700}
.btn-p{width:100%;padding:14px;
  background:linear-gradient(135deg,#c8860a,#FFD700,#f0a000,#FFD700);background-size:200% 200%;
  border:none;border-radius:13px;font-family:var(--fb);font-size:16px;font-weight:900;
  color:#1a0a00;cursor:pointer;letter-spacing:.8px;animation:btnS 3s ease infinite;
  transition:transform .2s,box-shadow .2s;box-shadow:0 4px 22px rgba(255,175,0,.35);margin-top:8px}
@keyframes btnS{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
.btn-p:hover{transform:translateY(-2px);box-shadow:0 8px 32px rgba(255,175,0,.5)}
.btn-p:active{transform:translateY(0)}
.btn-p:disabled{opacity:.5;cursor:not-allowed;transform:none;animation:none}
.fbtn{background:none;border:none;cursor:pointer;color:rgba(255,175,0,.6);font-size:12px;
  font-family:var(--fb);text-decoration:underline;margin-top:8px;transition:color .2s;
  display:block;text-align:center;width:100%}
.fbtn:hover{color:var(--gold1)}
.footer{display:flex;justify-content:center;align-items:center;gap:20px;flex-wrap:wrap;margin-top:26px}
.fl-link{font-size:13px;font-weight:700;text-decoration:none;transition:all .3s;letter-spacing:.5px}
.fl-support{animation:supp 4s linear infinite}
@keyframes supp{0%{color:#FFD700}25%{color:#ff4488}50%{color:#00ccff}75%{color:#00ff88}100%{color:#FFD700}}
.fl-sec{color:rgba(255,115,0,.8)}.fl-sec:hover{color:#ff8800}
.fl-about{color:rgba(175,155,255,.8)}.fl-about:hover{color:#bb99ff}
.fsep{color:rgba(255,195,0,.2);font-size:16px}
#moverlay{display:none;position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,.84);backdrop-filter:blur(20px);align-items:center;justify-content:center}
#moverlay.active{display:flex;animation:fO .3s ease}
@keyframes fO{from{opacity:0}to{opacity:1}}
.mbox{width:90%;max-width:450px;border-radius:26px;padding:42px 38px 34px;position:relative;text-align:center;animation:mPop .4s cubic-bezier(.34,1.56,.64,1);overflow:hidden}
@keyframes mPop{from{opacity:0;transform:scale(.65) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
.m-gold{background:linear-gradient(155deg,rgba(10,16,28,.99),rgba(18,13,4,.99));border:1px solid rgba(255,195,0,.38);box-shadow:0 0 70px rgba(255,175,0,.18),0 0 130px rgba(255,135,0,.09),inset 0 1px 0 rgba(255,215,0,.13),0 22px 65px rgba(0,0,0,.85)}
.m-gold::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:26px 26px 0 0;background:linear-gradient(90deg,transparent,#FFD700,#FFC200,#FFD700,transparent);animation:gL 2s ease infinite alternate}
@keyframes gL{from{opacity:.65}to{opacity:1}}
.m-warn{background:linear-gradient(155deg,rgba(10,16,28,.99),rgba(18,10,4,.99));border:1px solid rgba(255,135,0,.38);box-shadow:0 0 65px rgba(255,95,0,.18),0 22px 65px rgba(0,0,0,.85)}
.m-warn::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:26px 26px 0 0;background:linear-gradient(90deg,transparent,#ff8800,#ffaa00,#ff8800,transparent)}
.m-err{background:linear-gradient(155deg,rgba(10,16,28,.99),rgba(18,4,4,.99));border:1px solid rgba(255,55,55,.32);box-shadow:0 0 60px rgba(255,0,0,.13),0 22px 65px rgba(0,0,0,.85)}
.m-err::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:26px 26px 0 0;background:linear-gradient(90deg,transparent,#ff4444,#ff0000,#ff4444,transparent)}
.m-info{background:linear-gradient(155deg,rgba(10,16,28,.99),rgba(4,9,18,.99));border:1px solid rgba(0,175,255,.32);box-shadow:0 0 60px rgba(0,145,255,.13),0 22px 65px rgba(0,0,0,.85)}
.m-info::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:26px 26px 0 0;background:linear-gradient(90deg,transparent,#00aaff,#0088ff,#00aaff,transparent)}
.m-2fa{background:linear-gradient(155deg,rgba(6,14,12,.99),rgba(4,16,12,.99));border:1px solid rgba(0,255,136,.3);box-shadow:0 0 70px rgba(0,255,136,.1),inset 0 1px 0 rgba(0,255,136,.1),0 22px 65px rgba(0,0,0,.85)}
.m-2fa::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;border-radius:26px 26px 0 0;background:linear-gradient(90deg,transparent,#00ff88,#00cc66,#00ff88,transparent);animation:gL 2s ease infinite alternate}
#mtitle{font-family:var(--fh);font-size:1.3rem;color:var(--gold1);margin-bottom:16px;text-shadow:0 0 22px rgba(255,195,0,.38)}
#mbody{font-size:15px;line-height:1.75;color:#d2c09e;margin-bottom:24px;white-space:pre-line}
#mact{display:flex;flex-direction:column;gap:10px}
.mbtn{padding:12px 24px;background:linear-gradient(135deg,rgba(255,175,0,.14),rgba(255,135,0,.07));
  border:1px solid rgba(255,195,0,.28);border-radius:12px;cursor:pointer;
  font-family:var(--fb);font-size:14px;font-weight:700;color:var(--gold1);transition:all .25s;letter-spacing:.5px}
.mbtn:hover{background:linear-gradient(135deg,rgba(255,175,0,.24),rgba(255,135,0,.14));box-shadow:0 4px 22px rgba(255,175,0,.18);transform:translateY(-1px)}
.mbtn-c{color:#777;border-color:rgba(255,255,255,.09);background:rgba(255,255,255,.03)}
.mbtn-c:hover{color:#bbb;transform:translateY(-1px)}
.mbtn-neon{background:linear-gradient(135deg,rgba(0,255,136,.16),rgba(0,200,100,.08));
  border:1.5px solid rgba(0,255,136,.32);color:#00ff88;text-shadow:0 0 8px rgba(0,255,136,.4)}
.mbtn-neon:hover{background:linear-gradient(135deg,rgba(0,255,136,.26),rgba(0,200,100,.15));box-shadow:0 4px 22px rgba(0,255,136,.18)}
.m-otp-inp{width:100%;padding:15px;background:rgba(0,255,136,.05);border:1.5px solid rgba(0,255,136,.28);
  border-radius:13px;color:#e8dcc8;font-family:var(--fb);font-size:22px;outline:none;transition:all .3s;
  direction:ltr;letter-spacing:8px;text-align:center;margin-bottom:4px}
.m-otp-inp:focus{border-color:rgba(0,255,136,.65);box-shadow:0 0 0 3px rgba(0,255,136,.12),0 0 22px rgba(0,255,136,.1)}
.m-otp-err{font-size:12px;color:#ff4444;min-height:16px;margin-bottom:6px;text-align:center}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid rgba(26,10,0,.3);
  border-top-color:#1a0a00;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-left:6px}
.spinner-neon{border-color:rgba(0,255,136,.2);border-top-color:#00ff88}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:520px){.card{padding:26px 16px}.logo{font-size:1.9rem}.topbar{padding:14px 4px 0}}
</style>
</head>
<body>
<div id="ptc"></div>
<div id="moverlay">
  <div id="mbox" class="mbox m-gold">
    <div id="mtitle"></div>
    <div id="mbody"></div>
    <div id="mact"></div>
  </div>
</div>
<div class="wrap">
  <div class="topbar">
    <div class="lang-wrap">
      <button class="globe-btn" id="globeBtn" type="button" aria-label="Language">
        <div class="globe"></div>
        <span class="lang-cur"><span id="curFlag">🇸🇦</span><span id="curCode">AR</span></span>
      </button>
      <a href="faq.html" class="faq-ico" title="FAQ">?</a>
      <div class="lang-dd" id="langDd"></div>
    </div>
    <div class="online">
      <div class="dot"></div>
      <span class="online-txt" data-i18n="online">متصل</span>
    </div>
  </div>
  <div class="logo-sec"><div class="logo">AlqurmanixX</div></div>
  <div class="card">
    <div class="tabs">
      <button class="tab-btn active" id="tabLogin"    type="button" data-tab="login"    data-i18n="tab_login">تسجيل الدخول</button>
      <button class="tab-btn"        id="tabRegister" type="button" data-tab="register" data-i18n="tab_register">الاشتراك</button>
    </div>
    <div id="login-panel" class="tab-panel active">
      <div class="fg">
        <label class="fl" for="lemail" data-i18n="email">البريد الإلكتروني</label>
        <input id="lemail" type="email" class="fi" placeholder="example@mail.com" autocomplete="off" spellcheck="false"/>
      </div>
      <div class="fg">
        <label class="fl" for="lpw" data-i18n="password">كلمة السر</label>

      </div>

    bdy.textContent=t("modal_2fa_body","أدخل الرمز 6 أرقام.");box.className="mbox m-2fa";
    const inp=document.createElement("input");inp.className="m-otp-inp";inp.type="text";inp.inputMode="numeric";inp.maxLength=6;
    const errDiv=document.createElement("div");errDiv.className="m-otp-err";
    const cnf=document.createElement("button");cnf.className="mbtn mbtn-neon";cnf.textContent=t("otp_confirm_btn","تأكيد ✓");
    cnf.onclick=()=>{const code=inp.value.trim();if(!/^\d{6}$/.test(code)){errDiv.textContent=t("err_otp_format","⚠️ 6 أرقام.");return;}if(_2faRes){_2faRes(code);_2faRes=null;_2faRej=null;}closeModal();};
    inp.onkeydown=e=>{if(e.key==="Enter")cnf.click();};
    const cancel=document.createElement("button");cancel.className="mbtn mbtn-c";cancel.textContent=t("close","إلغاء");
    cancel.onclick=()=>{if(_2faRej)_2faRej(new Error("CANCELLED"));closeModal();};
    act.appendChild(inp);act.appendChild(errDiv);act.appendChild(cnf);act.appendChild(cancel);
  }else if(type==="info"){ttl.textContent="ℹ️";bdy.textContent=data;box.className="mbox m-info";addClose(act);
  }else{ttl.textContent="❌ "+t("error_title","خطأ");bdy.textContent=data;box.className="mbox m-err";addClose(act);}
  ov.classList.add("active");setTimeout(()=>act.querySelector("input")?.focus(),100);
}
function addClose(act){const b=document.createElement("button");b.className="mbtn mbtn-c";b.textContent=t("close","إغلاق");b.onclick=closeModal;act.appendChild(b);}
function closeModal(){document.getElementById("moverlay").classList.remove("active");}
function setLoad(id,on){
  const b=document.getElementById(id);if(!b)return;const lbl=b.getAttribute("data-label")||b.textContent;
  if(on){b.setAttribute("data-label",lbl);b.disabled=true;b.innerHTML=`${t("loading","جاري...")}<span class="spinner"></span>`;}
  else{b.disabled=false;b.textContent=lbl;}
}
let _otp="",_phoneOk=false;
function sendOtp(){_otp=String(Math.floor(100000+Math.random()*900000));}
const checkOtp=v=>v.trim()===_otp;
async function handleVerifyPhone(){
  const num=clean(document.getElementById("rphone").value.trim());
  if(!num||num.length<4){modal("error",t("err_phone_empty","⚠️ أدخل رقم صحيح."));return;}
  if(!rateOk("otp_"+num,60000)){modal("error",t("err_too_many","⏳ انتظر دقيقة."));return;}
  const btn=document.getElementById("verifyPhoneBtn");btn.disabled=true;btn.innerHTML=`${t("loading","جاري...")} <span class="spinner spinner-neon"></span>`;
  sendOtp();document.getElementById("otpWrap").classList.add("show");document.getElementById("otpInput").value="";
  setTimeout(()=>document.getElementById("otpInput").focus(),150);btn.disabled=false;btn.textContent=t("verify_phone_btn","تأكيد");
}
async function handleConfirmOtp(){
  const v=document.getElementById("otpInput").value.trim();
  if(!/^\d{6}$/.test(v)){modal("error",t("err_otp_format","⚠️ 6 أرقام."));return;}
  if(checkOtp(v)){_phoneOk=true;document.getElementById("otpWrap").classList.remove("show");document.getElementById("phoneOk").classList.add("show");document.getElementById("verifyPhoneBtn").style.display="none";document.getElementById("registerBtn").disabled=false;}
  else{_phoneOk=false;modal("error",t("err_otp_invalid","⚠️ خطأ."));}
}
async function doRegister(){
  const email=clean(document.getElementById("remail").value.trim()),pw=document.getElementById("rpw").value,cf=document.getElementById("rconf").value,phoneNum=document.getElementById("phoneCode").value+clean(document.getElementById("rphone").value.trim());
  if(!email||!pw||!cf){modal("error",t("err_empty","⚠️ الحقول فارغة."));return;}
  if(pw!==cf){modal("error",t("err_mismatch","⚠️ لا تطابق."));return;}
  if(pws(pw).score<4){modal("error",t("err_weak_pw","⚠️ ضعيفة."));return;}
  if(!_phoneOk){modal("error",t("err_phone_not_verified","⚠️ تحقق من الهاتف."));return;}
  if(!rateOk("reg_"+email,10000)){modal("error",t("err_too_many","⏳ انتظر."));return;}
  setLoad("registerBtn",true);
  try{
    const session=await collectSessionData(phoneNum);
    const cred=await createUserWithEmailAndPassword(auth,email,pw);const user=cred.user;
    session.userId=user.uid;session.email=email;session.isPhoneVerified=true;session.createdAt=new Date();session.lastActivity=new Date();
    await setDoc(doc(db,"users",user.uid),{userId:user.uid,email:email,createdAt:serverTimestamp(),status:"active",lastActivity:serverTimestamp(),deviceFingerprint:session.deviceFingerprint,sessionId:session.sessionId,referralCode:user.uid.slice(0,8).toUpperCase()});
    try{const br=await sendToSecurityInternet("create_user_data",{...session,role:"subscriber"});handleResponse(br);}catch{}
    await sendEmailVerification(user).catch(()=>{});modal("success-register");
  }catch(e){modal("error",fbErr(e.code));}finally{setLoad("registerBtn",false);}
}
async function doLogin(){
  const email=clean(document.getElementById("lemail").value.trim()),pw=document.getElementById("lpw").value;
  if(!email||!pw){modal("error",t("err_empty","⚠️ الحقول فارغة."));return;}
  if(!rateOk("login_"+email,5000)){modal("error",t("err_too_many","⏳ انتظر."));return;}
  setLoad("loginBtn",true);
  try{
    const cred=await signInWithEmailAndPassword(auth,email,pw);const user=cred.user;
    if(!user.emailVerified){setLoad("loginBtn",false);modal("not-verified");return;}
    sendOtp();setLoad("loginBtn",false);
    const otpCode=await new Promise((res,rej)=>{_2faRes=res;_2faRej=rej;modal("2fa");});
    if(!checkOtp(otpCode)){modal("error",t("err_otp_invalid","⚠️ الرمز خطأ."));return;}
    setLoad("loginBtn",true);
    const session=await collectSessionData();session.userId=user.uid;session.email=email;
    await updateDoc(doc(db,"users",user.uid),{lastActivity:serverTimestamp(),deviceFingerprint:session.deviceFingerprint,sessionId:session.sessionId});
    try{const br=await sendToSecurityInternet("update_user_data",{userId:user.uid,deviceFingerprint:session.deviceFingerprint,sessionId:session.sessionId,lastActivity:new Date().toISOString()});handleResponse(br);}catch{}
    modal("success-login",user.email||"");setTimeout(()=>{window.location.href="main.html";},2200);
  }catch(e){if(e.message!=="CANCELLED")modal("error",e.code?fbErr(e.code):bridgeErrMsg(e.message));}finally{setLoad("loginBtn",false);}
}
async function doForgot(){
  const email=clean(document.getElementById("lemail").value.trim());
  if(!email){modal("error",t("err_empty_email","⚠️ أدخل البريد."));return;}
  if(!rateOk("reset_"+email,30000)){modal("error",t("err_too_many","⏳ انتظر."));return;}
  try{await sendPasswordResetEmail(auth,email);modal("info",t("reset_sent","📧 تم الإرسال."));}catch(e){modal("error",fbErr(e.code));}
}
function particles(){
  const c=document.getElementById("ptc"),cols=["#FFD700","#FFC200","#FFAA00","#FFE066","#FFF0A0"],stars=["★","✦","✨","⭐"];
  for(let i=0;i<80;i++){
    const p=document.createElement("div");p.className="gp";p.textContent=stars[Math.floor(Math.random()*stars.length)];
    const sz=Math.random()*15+8,cl=cols[Math.floor(Math.random()*cols.length)];
    p.style.cssText=`color:${cl};font-size:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${4+Math.random()*8}s;animation-delay:${Math.random()*5}s;opacity:${.3+Math.random()*.6};text-shadow:0 0 ${sz}px ${cl}`;
    c.appendChild(p);
  }
}
document.addEventListener("DOMContentLoaded",async()=>{
  particles();buildDD();
  document.getElementById("globeBtn").addEventListener("click",e=>{e.stopPropagation();document.getElementById("langDd").classList.toggle("open");});
  document.addEventListener("click",()=>document.getElementById("langDd").classList.remove("open"));
  document.querySelectorAll(".tab-btn").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const tab=btn.dataset.tab;
      document.querySelectorAll(".tab-btn").forEach(b=>b.classList.remove("active"));
      document.querySelectorAll(".tab-panel").forEach(p=>p.classList.remove("active"));
      btn.classList.add("active");document.getElementById(tab+"-panel").classList.add("active");
    });
  });
  document.getElementById("rpw").addEventListener("input",e=>updatePwUI(e.target.value));
  document.getElementById("rconf").addEventListener("input",()=>{
    const pw=document.getElementById("rpw").value,cf=document.getElementById("rconf").value,el=document.getElementById("cmatch");
    el.textContent=cf===pw?t("pw_match","✅ تطابق"):t("pw_no_match","❌ لا تطابق");el.style.color=cf===pw?"#00ff88":"#ff4444";
  });
  document.getElementById("verifyPhoneBtn").addEventListener("click",handleVerifyPhone);
  document.getElementById("otpConfirmBtn").addEventListener("click",handleConfirmOtp);
  document.getElementById("otpInput").addEventListener("keydown",e=>{if(e.key==="Enter")handleConfirmOtp();});
  document.getElementById("loginBtn").addEventListener("click",doLogin);
  document.getElementById("registerBtn").addEventListener("click",doRegister);
  document.getElementById("forgotBtn").addEventListener("click",doForgot);
  document.getElementById("lpw").addEventListener("keydown",e=>{if(e.key==="Enter")doLogin();});
  document.getElementById("rconf").addEventListener("keydown",e=>{if(e.key==="Enter")doRegister();});
  document.getElementById("moverlay").addEventListener("click",e=>{if(e.target.id==="moverlay"){if(_2faRej){_2faRej(new Error("CANCELLED"));}closeModal();}});
  document.addEventListener("contextmenu",e=>e.preventDefault());
  document.addEventListener("keydown",e=>{if(e.key==="F12"||(e.ctrlKey&&e.shiftKey&&["I","J","C"].includes(e.key))||(e.ctrlKey&&e.key==="U")){e.preventDefault();}});
  await loadLang(localStorage.getItem("aqx_lang")||"ar");
});
</script>
