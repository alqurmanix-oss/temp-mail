<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALQURMANI X — المعمل</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* التدرج الذهبي الذي شرحناه */
            --g1:#FFD700; --g2:#FFC200; --g3:#E6A800; --g4:#F0B429;
            --g5:#FFEC80; --g6:#C8860A; --g7:#B8720A; --g8:#FFE066;
            --neon:#39FF14; --bg:#020409; --card:rgba(8,11,24,0.96);
            --border:rgba(255,215,0,0.22); --txt:#F5F0DC;
            --shadow:0 0 28px rgba(255,215,0,0.18); --th:64px; --r:16px;
        }

        /* تنسيق الجسم والخلفية الفضائية */
        body { 
            background: var(--bg); color: var(--txt); font-family: 'Tajawal', sans-serif; 
            margin: 0; min-height: 100vh; overflow-x: hidden; position: relative;
        }

        body::before {
            content:''; position:fixed; inset:0; z-index:-1;
            background: radial-gradient(ellipse at 15% 50%,rgba(255,215,0,0.035) 0%,transparent 55%);
        }

        /* Topbar الملكي */
        #topbar {
            position:fixed; top:0; left:0; right:0; height:var(--th); z-index:1000;
            display:flex; align-items:center; justify-content:space-between; padding:0 20px;
            background:rgba(2,4,9,0.97); border-bottom:1px solid var(--border);
            backdrop-filter:blur(22px); box-shadow: 0 2px 30px rgba(255, 215, 0, 0.07);
        }

        #logo {
            font-family:'Cinzel Decorative'; font-weight:900; font-size:clamp(18px, 3vw, 24px);
            background:linear-gradient(90deg, var(--g6), var(--g1), var(--g5), var(--g2));
            -webkit-background-clip:text; -webkit-text-fill-color:transparent;
            animation: goldShift 4s linear infinite; background-size: 400% 100%;
        }
        @keyframes goldShift { 0% { background-position: 0% 50% } 100% { background-position: 400% 50% } }

        /* المحتوى الرئيسي */
        #page { margin-top: var(--th); padding: 40px 20px; max-width: 1200px; margin-inline: auto; }

        /* الكروت الملكية */
        #hero { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media(max-width:700px) { #hero { grid-template-columns: 1fr; } }

        .hcard {
            background: var(--card); border: 1px solid var(--border); border-radius: var(--r);
            padding: 26px; box-shadow: var(--shadow); position: relative; overflow: hidden;
            animation: fadeUp 0.6s ease both;
        }
        .hcard::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
            background: linear-gradient(90deg, var(--g6), var(--g1), var(--g5));
        }

        #ptsVal {
            font-family: 'Cinzel Decorative'; font-size: 46px; font-weight: 900;
            background: linear-gradient(135deg, var(--g6), var(--g1), var(--g5));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            animation: gp 2.5s ease-in-out infinite;
        }
        @keyframes gp { 0%, 100% { filter: brightness(1) } 50% { filter: brightness(1.35) } }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="topbar">
        <div id="logo">ALQURMANI X</div>
        <div style="display:flex; align-items:center; gap:8px; color:var(--neon); font-size:12px;">
            <div style="width:8px; height:8px; background:var(--neon); border-radius:50%; box-shadow:0 0 10px var(--neon);"></div>
            LIVE SYSTEM
        </div>
    </div>

    <div id="page">
        <div id="hero">
            <div class="hcard">
                <div style="display: flex; align-items: center; gap: 18px;">
                    <div style="width: 70px; height: 70px; border-radius: 50%; border: 3px solid var(--g1); background: #000; display:flex; align-items:center; justify-content:center; font-size:30px;">👑</div>
                    <div>
                        <div style="font-family:'Cinzel Decorative'; font-weight:bold; color:var(--g1); font-size:20px;">M. AlQurmani</div>
                        <div style="font-size: 11px; color: rgba(245,240,220,0.5);">ADMINISTRATOR</div>
                    </div>
                </div>
            </div>

            <div class="hcard" style="text-align: center;">
                <div style="font-size: 11px; color: rgba(245,240,220,0.5); letter-spacing: 2px;">TOTAL POINTS</div>
                <div id="ptsVal">1,250,000</div>
                <div style="margin-top:10px; font-size:12px; color:var(--g1)">ROYAL BALANCE</div>
            </div>
        </div>
    </div>

</body>
</html>
